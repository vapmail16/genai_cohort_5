function FlatNode({ id, x, y, w, h, rx=8, label, sub, bg, stroke, textCol, subCol, active, onSelect }) {
  const [hov, setHov] = useState(false);
  return (
    <g onClick={()=>onSelect(id)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{cursor:"pointer"}}>
      <rect x={x} y={y} width={w} height={h} rx={rx}
        fill={hov||active ? bg : "#fff"}
        stroke={stroke} strokeWidth={active?1.8:hov?1.2:0.8}/>
      <text x={x+w/2} y={sub?y+h/2-7:y+h/2} textAnchor="middle" dominantBaseline="central"
        fill={textCol} fontSize={12.5} fontWeight={600}
        fontFamily="ui-monospace,SFMono-Regular,Menlo,monospace">{label}</text>
      {sub && <text x={x+w/2} y={y+h/2+8} textAnchor="middle" dominantBaseline="central"
        fill={subCol} fontSize={10}
        fontFamily="ui-monospace,SFMono-Regular,Menlo,monospace">{sub}</text>}
    </g>
  );
}

function AgentNode({ id, x, y, w, h, label, sub, active, onSelect }) {
  const [hov, setHov] = useState(false);
  const cx = x + w/2;
  return (
    <g onClick={()=>onSelect(id)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{cursor:"pointer"}}>
      <rect x={x} y={y} width={w} height={h} rx={8}
        fill={hov||active ? C.pBg : "#fff"}
        stroke={C.pStroke} strokeWidth={active?1.8:hov?1.2:0.8}/>
      <text x={cx} y={y+h/2-7} textAnchor="middle" dominantBaseline="central"
        fill={C.pText} fontSize={12} fontWeight={600}
        fontFamily="ui-monospace,SFMono-Regular,Menlo,monospace">{label}</text>
      <text x={cx} y={y+h/2+7} textAnchor="middle" dominantBaseline="central"
        fill={C.pSub} fontSize={9.5}
        fontFamily="ui-monospace,SFMono-Regular,Menlo,monospace">{sub}</text>
    </g>
  );
}

function Tag({ text, color }) {
  return (
    <span style={{
      display:"inline-block", fontSize:11, fontWeight:600,
      color, background:color+"18", border:`1px solid ${color}33`,
      borderRadius:4, padding:"2px 8px", margin:"0 4px 4px 0",
      fontFamily:"ui-monospace,monospace",
    }}>{text}</span>
  );
}

function SectionLabel({ text }) {
  return (
    <p style={{
      fontSize:10, fontWeight:700, letterSpacing:"0.1em",
      textTransform:"uppercase", color:"#94a3b8", marginBottom:8,
      fontFamily:"ui-monospace,monospace",
    }}>{text}</p>
  );
}

function InfoPanel({ def, onClose }) {
  if (!def) return null;
  const cc = def.catColor;
  return (
    <div style={{
      width:540, height:"100vh", overflowY:"auto",
      background:"#fff", borderLeft:"1px solid #e2e8f0",
      padding:"24px 24px 60px", boxSizing:"border-box",
      fontFamily:"system-ui,-apple-system,sans-serif", flexShrink:0,
    }}>
      {/* Category + close */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <span style={{
          fontSize:10, fontWeight:700, letterSpacing:"0.08em",
          textTransform:"uppercase", color:cc,
          padding:"3px 10px", background:cc+"12",
          border:`1px solid ${cc}33`, borderRadius:4,
          fontFamily:"ui-monospace,monospace",
        }}>{def.category}</span>
        <button onClick={onClose} style={{
          background:"none", border:"1px solid #e2e8f0", borderRadius:6,
          cursor:"pointer", color:"#64748b", fontSize:14,
          width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center",
        }}>✕</button>
      </div>

      <h2 style={{fontSize:20,fontWeight:700,color:"#0f172a",margin:"0 0 4px"}}>{def.title}</h2>
      <p style={{fontSize:11.5,color:"#64748b",margin:"0 0 16px",fontFamily:"ui-monospace,monospace"}}>{def.subtitle}</p>
      <div style={{height:1,background:"#f1f5f9",margin:"0 0 16px"}}/>

      <p style={{fontSize:13.5,color:"#374151",lineHeight:1.7,margin:0}}>{def.description}</p>

      {/* Role */}
      <div style={{marginTop:20}}>
        <SectionLabel text="What it does"/>
        <p style={{fontSize:13,color:"#374151",lineHeight:1.6,margin:0,
          padding:"10px 14px",background:"#f8fafc",borderRadius:6,border:"1px solid #e2e8f0"}}>
          {def.role}
        </p>
      </div>

      {/* Connects to */}
      <div style={{marginTop:20}}>
        <SectionLabel text="Connects to"/>
        <div>{(def.connects||[]).map(c=><Tag key={c} text={c} color={cc}/>)}</div>
      </div>

      {/* MCP Tools */}
      {def.tools && (
        <div style={{marginTop:20}}>
          <SectionLabel text="MCP Tools"/>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {def.tools.map(t=>(
              <div key={t.name} style={{padding:"10px 12px",background:C.tBg,
                border:`1px solid ${C.tStroke}33`,borderRadius:6}}>
                <span style={{display:"block",fontSize:11.5,fontWeight:700,
                  color:C.tText,marginBottom:4,fontFamily:"ui-monospace,monospace"}}>
                  {t.name}()
                </span>
                <span style={{fontSize:12.5,color:"#4b5563",lineHeight:1.5}}>{t.desc}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* MCP Tools called */}
      {def.mcp_tools_called && (
        <div style={{marginTop:20}}>
          <SectionLabel text="MCP tools this agent calls"/>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {def.mcp_tools_called.map(t=>(
              <div key={t.name} style={{padding:"10px 12px",background:C.tBg,
                border:`1px solid ${C.tStroke}33`,borderRadius:6}}>
                <span style={{display:"block",fontSize:11.5,fontWeight:700,
                  color:C.tText,marginBottom:4,fontFamily:"ui-monospace,monospace"}}>
                  {t.name}()
                </span>
                <span style={{fontSize:12.5,color:"#4b5563",lineHeight:1.5}}>{t.desc}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Files */}
      {def.files && (
        <div style={{marginTop:20}}>
          <SectionLabel text="Files"/>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {def.files.map(f=>(
              <div key={f.name} style={{padding:"9px 12px",background:"#f8fafc",
                border:"1px solid #e2e8f0",borderRadius:6}}>
                <span style={{display:"block",fontSize:11.5,fontWeight:700,
                  color:C.pText,marginBottom:3,fontFamily:"ui-monospace,monospace"}}>
                  {f.name}
                </span>
                <span style={{fontSize:12.5,color:"#4b5563",lineHeight:1.5}}>{f.desc}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* State fields */}
      {def.state && (
        <div style={{marginTop:20}}>
          <SectionLabel text="LangGraph state fields"/>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {def.state.map(s=>(
              <div key={s.name} style={{padding:"8px 12px",background:"#faf5ff",
                border:"1px solid #7c3aed22",borderRadius:6}}>
                <span style={{display:"block",fontSize:11.5,fontWeight:700,
                  color:C.pText,marginBottom:3,fontFamily:"ui-monospace,monospace"}}>
                  {s.name}
                </span>
                <span style={{fontSize:12.5,color:"#4b5563",lineHeight:1.5}}>{s.desc}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Graph edges */}
      {def.edges && (
        <div style={{marginTop:20}}>
          <SectionLabel text="Graph edges"/>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {def.edges.map((e,i)=>(
              <div key={i} style={{fontSize:12.5,color:"#374151",lineHeight:1.55,
                padding:"5px 12px",borderLeft:"3px solid #e2e8f0",
                fontFamily:"ui-monospace,monospace"}}>{e}</div>
            ))}
          </div>
        </div>
      )}

      {/* Documents */}
      {def.documents && (
        <div style={{marginTop:20}}>
          <SectionLabel text="Knowledge base documents"/>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {def.documents.map((d,i)=>(
              <div key={i} style={{fontSize:12.5,color:"#374151",lineHeight:1.55,
                padding:"6px 12px",borderLeft:"3px solid #e2e8f0",
                fontFamily:"ui-monospace,monospace"}}>{d}</div>
            ))}
          </div>
        </div>
      )}

      {/* Schema */}
      {def.schema && (
        <div style={{marginTop:20}}>
          <SectionLabel text="Database schema"/>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {def.schema.map(s=>(
              <div key={s.name} style={{padding:"9px 12px",background:"#f8fafc",
                border:"1px solid #e2e8f0",borderRadius:6}}>
                <span style={{display:"block",fontSize:11.5,fontWeight:700,
                  color:C.dText,marginBottom:3,fontFamily:"ui-monospace,monospace"}}>
                  {s.name}
                </span>
                <span style={{fontSize:12,color:"#64748b",lineHeight:1.5,fontFamily:"ui-monospace,monospace"}}>{s.desc}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Structured output */}
      {def.structured_output && (
        <div style={{marginTop:20}}>
          <SectionLabel text="Pydantic structured output"/>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {def.structured_output.map(f=>(
              <div key={f.name} style={{padding:"8px 12px",background:"#faf5ff",
                border:"1px solid #7c3aed22",borderRadius:6}}>
                <span style={{display:"block",fontSize:11.5,fontWeight:700,
                  color:C.pText,marginBottom:3,fontFamily:"ui-monospace,monospace"}}>
                  {f.name}
                </span>
                <span style={{fontSize:12.5,color:"#4b5563",lineHeight:1.5}}>{f.desc}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Commands */}
      {def.commands && (
        <div style={{marginTop:20}}>
          <SectionLabel text="Key commands"/>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {def.commands.map((c,i)=>(
              <div key={i} style={{fontSize:12,color:"#374151",lineHeight:1.55,
                padding:"6px 12px",background:"#f1f5f9",borderRadius:5,
                fontFamily:"ui-monospace,monospace"}}>{c}</div>
            ))}
          </div>
        </div>
      )}

      {/* Examples */}
      {def.examples && (
        <div style={{marginTop:20}}>
          <SectionLabel text="Examples"/>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {def.examples.map((e,i)=>(
              <div key={i} style={{fontSize:12.5,color:"#374151",lineHeight:1.55,
                padding:"6px 12px",borderLeft:"3px solid #e2e8f0",
                fontFamily:"ui-monospace,monospace"}}>{e}</div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════
function App() {
  const [sel, setSel] = useState(null);
  const pick = id => setSel(p => p === id ? null : id);
  const def = sel ? DEFS[sel] : null;

  const Arr = ({x1,y1,x2,y2}) => (
    <line x1={x1} y1={y1} x2={x2} y2={y2}
      stroke={C.line} strokeWidth={1} markerEnd="url(#arr)"/>
  );

  // sequential flow arrows between agents (small horizontal arrows)
  const FlowArr = ({x1,y,x2}) => (
    <line x1={x1} y1={y} x2={x2} y2={y}
      stroke="#a78bfa" strokeWidth={1.2} markerEnd="url(#arrp)"/>
  );

  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.pageBg}}>

      {/* ── DIAGRAM ─────────────────────────────── */}
      <div style={{flex:1,padding:"28px 32px 40px",overflowY:"auto",minWidth:0}}>

        {/* Header */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:4}}>
            <h1 style={{fontSize:17,fontWeight:700,color:"#0f172a",margin:0}}>
              Acme Corp — IT Support Agent
            </h1>
            <span style={{fontSize:11,color:"#94a3b8",fontFamily:"ui-monospace,monospace"}}>
              GenAI Cohort 5 · Capstone Project
            </span>
          </div>
          <p style={{fontSize:12.5,color:"#64748b",margin:0,fontFamily:"ui-monospace,monospace"}}>
            React · FastAPI · LangGraph · MCP · Qdrant · SQLite · Docker  ·  Click any node to explore
          </p>
          <p style={{fontSize:11.5,color:"#475569",margin:"8px 0 0",maxWidth:720,lineHeight:1.45}}>
            <strong>As implemented in the capstone repo:</strong> the floating chat uses <code style={{fontSize:11}}>POST /chat</code> with
            demo tracks in <code style={{fontSize:11}}>backend/chat_demo/</code> (plain LLM, KB RAG, DB RAG over SQLite rows, agentic tools via{' '}
            <code style={{fontSize:11}}>ActionAgent</code>; MCP stdio when <code style={{fontSize:11}}>USE_REAL_MCP=1</code>).
            The LangGraph orchestrator below is the <em>intended</em> multi-agent layout; merge with <code style={{fontSize:11}}>/chat</code> is optional.
          </p>
        </div>

        {/* SVG */}
        <svg width="100%" viewBox="0 0 700 554" style={{display:"block",maxWidth:900}}>
          <defs>
            <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
              markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M2 1L8 5L2 9" fill="none" stroke={C.line}
                strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </marker>
            <marker id="arrp" viewBox="0 0 10 10" refX="8" refY="5"
              markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M2 1L8 5L2 9" fill="none" stroke="#a78bfa"
                strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </marker>
          </defs>

          {/* ── Row 1: React UI ─────────────────── */}
          <FlatNode id="react_ui" x={200} y={12} w={300} h={44}
            label="React Chat UI + Ticket Dashboard" sub="frontend/ · React + Vite + Tailwind"
            bg={C.pBg} stroke={C.pStroke} textCol={C.pText} subCol={C.pSub}
            active={sel==="react_ui"} onSelect={pick}/>

          {/* HTTP / SSE label */}
          <text x={360} y={70} textAnchor="middle" fill="#94a3b8" fontSize={9}
            fontFamily="ui-monospace,monospace">HTTP / SSE streaming</text>
          <Arr x1={350} y1={56} x2={350} y2={76}/>

          {/* ── Row 2: FastAPI + LangGraph container */}
          <rect x={22} y={76} width={656} height={182} rx={10}
            fill={C.pBg} stroke={C.pStroke} strokeWidth={0.6} strokeDasharray="5 3"/>
          <text x={38} y={90} fill="#a78bfa" fontSize={9} fontWeight={700}
            letterSpacing={2} fontFamily="ui-monospace,monospace">
            FASTAPI BACKEND + LANGGRAPH
          </text>

          {/* Orchestrator */}
          <FlatNode id="orchestrator" x={190} y={96} w={320} h={34}
            label="LangGraph Orchestrator" sub="orchestrator.py · SQLite checkpointer"
            bg={C.pBg} stroke={C.pStroke} textCol={C.pText} subCol={C.pSub}
            active={sel==="orchestrator"} onSelect={pick}/>

          {/* Orch → agents (fan) */}
          <Arr x1={250} y1={130} x2={116} y2={146}/>
          <Arr x1={310} y1={130} x2={272} y2={146}/>
          <Arr x1={390} y1={130} x2={429} y2={146}/>
          <Arr x1={450} y1={130} x2={584} y2={146}/>

          {/* 4 Agents */}
          <AgentNode id="triage_agent" x={38} y={146} w={148} h={52}
            label="Triage agent" sub="Classifies issue"
            active={sel==="triage_agent"} onSelect={pick}/>
          <AgentNode id="rag_agent" x={196} y={146} w={148} h={52}
            label="RAG agent" sub="Knowledge search"
            active={sel==="rag_agent"} onSelect={pick}/>
          <AgentNode id="ticket_agent" x={354} y={146} w={148} h={52}
            label="Ticket agent" sub="Create & manage"
            active={sel==="ticket_agent"} onSelect={pick}/>
          <AgentNode id="response_agent" x={512} y={146} w={148} h={52}
            label="Response agent" sub="Format & stream"
            active={sel==="response_agent"} onSelect={pick}/>

          {/* Sequential flow arrows between agents */}
          <FlowArr x1={186} y={172} x2={196}/>
          <FlowArr x1={344} y={172} x2={354}/>
          <FlowArr x1={502} y={172} x2={512}/>

          {/* Flow labels */}
          <text x={191} y={168} textAnchor="middle" fill="#a78bfa" fontSize={8}
            fontFamily="ui-monospace,monospace">→</text>
          {/* conditional label under rag agent */}
          <text x={270} y={206} textAnchor="middle" fill="#94a3b8" fontSize={8}
            fontFamily="ui-monospace,monospace">if unresolved → ticket</text>

          {/* Container bottom: y=258 */}

          {/* Arrows out of container */}
          <Arr x1={200} y1={258} x2={182} y2={278}/>
          <Arr x1={500} y1={258} x2={518} y2={278}/>

          {/* MCP Protocol band */}
          <FlatNode id="mcp_protocol" x={22} y={280} w={656} h={26} rx={4}
            label="MCP Protocol  ·  JSON-RPC 2.0  ·  stdio transport"
            sub={null}
            bg={C.prBg} stroke={C.prStroke} textCol={C.prText} subCol={C.prText}
            active={sel==="mcp_protocol"} onSelect={pick}/>

          {/* Protocol → data nodes */}
          <Arr x1={182} y1={306} x2={182} y2={324}/>
          <Arr x1={518} y1={306} x2={518} y2={324}/>

          {/* ── Row 4: Chroma + MCP Server ─────── */}
          <DocNode id="chroma" x={22} y={326} w={316} h={148}
            label="Chroma Vector Store" sub="backend/rag/ · text-embedding-3-small"
            docs={["wifi_troubleshooting.md","vpn_setup_guide.md","password_reset_sop.md",
                   "laptop_setup_checklist.md","common_error_codes.md","software_install_policies.md"]}
            active={sel==="chroma"} onSelect={pick}/>

          <ServerNode id="mcp_server" x={352} y={326} w={326} h={148}
            label="MCP IT Support Server" sub="backend/mcp_server/server.ts · TypeScript"
            tools={["create_ticket","get_ticket","update_ticket_status",
                    "check_system_status","reset_password_link","search_known_issues"]}
            active={sel==="mcp_server"} onSelect={pick}/>

          {/* Row 4 → Row 5 arrows */}
          <Arr x1={182} y1={474} x2={182} y2={492}/>
          <Arr x1={460} y1={474} x2={430} y2={492}/>
          <Arr x1={580} y1={474} x2={590} y2={492}/>

          {/* ── Row 5: Data / Deploy ────────────── */}
          <FlatNode id="it_docs" x={22} y={494} w={316} h={42}
            label="IT Knowledge Base (6 docs)" sub="backend/rag/docs/ · Markdown"
            bg={C.dBg} stroke={C.dStroke} textCol={C.dText} subCol={C.dSub}
            active={sel==="it_docs"} onSelect={pick}/>

          <FlatNode id="sqlite" x={352} y={494} w={160} h={42}
            label="SQLite" sub="tickets · chat history"
            bg={C.dBg} stroke={C.dStroke} textCol={C.dText} subCol={C.dSub}
            active={sel==="sqlite"} onSelect={pick}/>

          <FlatNode id="deployment" x={524} y={494} w={154} h={42}
            label="Docker + Railway" sub="Dockerfile · deploy"
            bg={C.dBg} stroke={C.dStroke} textCol={C.dText} subCol={C.dSub}
            active={sel==="deployment"} onSelect={pick}/>
        </svg>

        {/* Legend */}
        <div style={{display:"flex",gap:20,marginTop:16}}>
          {[
            {color:C.pStroke, bg:C.pBg, label:"Frontend / Agent layer"},
            {color:C.tStroke, bg:C.tBg, label:"MCP Server"},
            {color:C.dStroke, bg:C.dBg, label:"Data / Deployment"},
          ].map(({color,bg,label})=>(
            <div key={label} style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:12,height:12,borderRadius:3,background:bg,border:`1.5px solid ${color}`}}/>
              <span style={{fontSize:11,color:"#64748b",fontFamily:"ui-monospace,monospace"}}>{label}</span>
            </div>
          ))}
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:24,height:2,background:"#a78bfa",borderRadius:1}}/>
            <span style={{fontSize:11,color:"#64748b",fontFamily:"ui-monospace,monospace"}}>Agent flow sequence</span>
          </div>
        </div>
      </div>

      {/* ── PANEL ────────────────────────────────── */}
      {sel && <InfoPanel def={def} onClose={()=>setSel(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
