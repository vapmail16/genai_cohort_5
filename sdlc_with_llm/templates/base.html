<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Compliance & Audit Copilot{% endblock %}</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 1.5rem;
            line-height: 1.6;
        }
        .container { max-width: 960px; margin: 0 auto; }
        h1 {
            font-size: 1.75rem;
            margin: 0 0 0.5rem;
            color: var(--accent);
        }
        .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .metric {
            background: var(--card);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }
        .metric-value { font-size: 1.5rem; font-weight: 700; }
        .metric-label { font-size: 0.8rem; color: var(--muted); }
        .section {
            background: var(--card);
            padding: 1.25rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .section h2 {
            font-size: 1.1rem;
            margin: 0 0 1rem;
            color: var(--accent);
        }
        .update-item, .gap-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            font-size: 0.75rem;
            border-radius: 4px;
            font-weight: 600;
        }
        .badge-new { background: var(--success); color: var(--bg); }
        .badge-modified { background: var(--warning); color: var(--bg); }
        .badge-high { background: var(--danger); color: white; }
        .badge-medium { background: var(--warning); color: var(--bg); }
        .empty { color: var(--muted); font-style: italic; }
        .muted { color: var(--muted); }
        .alert { padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; }
        .alert-warning { background: rgba(251,191,36,0.2); color: var(--warning); }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
